spring:
  application:
    name: server
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI}
          issuer-uri: ${ISSUER_URI}
  liquibase:
    enabled: false
# конфигурация провайдеров курсов валют
exchange:
  rates:
    providers:
      nbrb-byn:
        cron: "0 9 * * * *"
        max-attempts: 5
        backoff-delay: 10000
        backoff-multiplier: 2.0
      cbr-rub:
        cron: "0 9 * * * *"
        max-attempts: 3
        backoff-delay: 5000
        backoff-multiplier: 1.0
# конфигурация логгера
logging:
  level:
    root: info
