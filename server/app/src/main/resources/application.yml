spring:
  application:
    name: server
  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  liquibase:
    enabled: false
  profiles:
    active: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI}
          issuer-uri: ${ISSUER_URI}
